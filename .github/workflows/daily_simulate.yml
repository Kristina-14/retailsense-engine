name: Daily Data Simulator

on:
  schedule:
    - cron: '0 1 * * *'   # 1am UTC = 6:30am IST
  workflow_dispatch:

jobs:
  simulate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install sqlalchemy psycopg2-binary

      - name: Wake up Neon
        env:
          NEON_URL: ${{ secrets.NEON_URL }}
        run: |
          python -c "
          import os, time
          from sqlalchemy import create_engine, text
          engine = create_engine(os.environ['NEON_URL'],
              connect_args={'sslmode':'require','connect_timeout':30})
          for i in range(3):
              try:
                  with engine.connect() as conn:
                      conn.execute(text('SELECT 1'))
                  print('✓ Neon awake')
                  break
              except Exception as e:
                  print(f'Wakeup attempt {i+1}: {e}')
                  time.sleep(15)
          "

      - name: Wait for DB to stabilise
        run: sleep 5

      - name: Release daily batch
        env:
          NEON_URL: ${{ secrets.NEON_URL }}
        run: python src/simulate_daily.py
