name: Daily Data Simulator

on:
  schedule:
    - cron: '0 1 * * *'
  workflow_dispatch:

jobs:
  simulate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install sqlalchemy psycopg2-binary

      - name: Wake up Supabase
        env:
          SUPABASE_PASSWORD: ${{ secrets.SUPABASE_PASSWORD }}
        run: |
          python -c "
          import os, time
          from sqlalchemy import create_engine, text
          from urllib.parse import quote_plus
          password = quote_plus(os.environ['SUPABASE_PASSWORD'])
          url = f'postgresql://postgres.gsqizlwftqumpjhcmmzk:{password}@aws-1-ap-south-1.pooler.supabase.com:5432/postgres'
          engine = create_engine(url)
          for i in range(3):
              try:
                  with engine.connect() as conn:
                      conn.execute(text('SELECT 1'))
                  print('✓ Supabase awake')
                  break
              except Exception as e:
                  print(f'Wakeup attempt {i+1}: {e}')
                  time.sleep(15)
          "

      - name: Wait for DB to stabilise
        run: sleep 5

      - name: Release daily batch
        env:
          SUPABASE_PASSWORD: ${{ secrets.SUPABASE_PASSWORD }}
        run: python src/simulate_daily.py
